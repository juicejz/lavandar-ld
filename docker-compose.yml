version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clientuser
      POSTGRES_PASSWORD: clientpass
      POSTGRES_DB: clientdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"  

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend/app:/app/app   # live‑reload while coding
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    volumes:
    - ./frontend:/app
    - /app/node_modules 
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
